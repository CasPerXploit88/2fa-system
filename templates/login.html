{% extends "base.html" %}
{% block title %}Login — S1xSec 2FA{% endblock %}

{% block content %}
<div class="card">
  <div class="card-header">
    <h1 class="card-title">Sign In</h1>
    <p class="card-sub">Step 1 of 2 — Credentials</p>
  </div>

  {% if registered %}
  <div class="alert alert-success">Account created. You can now sign in.</div>
  {% endif %}

  {% if error %}
  <div class="alert alert-error">{{ error }}</div>
  {% endif %}

  <form method="POST" action="{{ url_for('login') }}" novalidate>
    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" placeholder="s1xsec" autocomplete="off" required>
    </div>

    <div class="field">
      <label for="password">Password</label>
      <div class="input-wrap">
        <input type="password" id="password" name="password" placeholder="Your password" required>
        <button type="button" class="toggle-pw" aria-label="Show password">👁</button>
      </div>
    </div>

    <button type="submit" class="btn btn-primary">Continue</button>
  </form>

  <p class="switch">No account? <a href="{{ url_for('register') }}">Register</a></p>
</div>
{% endblock %}
