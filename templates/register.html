{% extends "base.html" %}
{% block title %}Register — S1xSec 2FA{% endblock %}

{% block content %}
<div class="card">
  <div class="card-header">
    <h1 class="card-title">Create Account</h1>
    <p class="card-sub">2FA protection enabled by default</p>
  </div>

  {% if error %}
  <div class="alert alert-error">{{ error }}</div>
  {% endif %}

  <form method="POST" action="{{ url_for('register') }}" novalidate>
    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" placeholder="s1xsec" autocomplete="off" required>
    </div>
    <div class="field">
      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" placeholder="you@email.com" autocomplete="off" required>
      <span class="hint">OTP codes will be sent here</span>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <div class="input-wrap">
        <input type="password" id="password" name="password" placeholder="Min 8 characters" required>
        <button type="button" class="toggle-pw" aria-label="Show password">👁</button>
      </div>
      <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
      <span class="hint" id="strengthLabel">Password strength</span>
    </div>
    <button type="submit" class="btn btn-primary">Create Account</button>
  </form>

  <p class="switch">Already have an account? <a href="{{ url_for('login') }}">Sign in</a></p>
</div>
{% endblock %}
